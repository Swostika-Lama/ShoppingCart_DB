version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: shopping_cart_localization
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-shopping_cart_localization}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-mysecurepass}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    image: swostikalama/shoppingcartgui
    platform: linux/amd64
    container_name: shopping_cart_gui
    depends_on:
      - db
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-shopping_cart_localization}
      DB_USER: ${DB_USER:-shopping_user}
      DB_PASSWORD: ${DB_PASSWORD:-mysecurepass}
      DISPLAY: host.docker.internal:0
      JAVA_TOOL_OPTIONS: "-Dprism.order=sw"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
volumes:
  db_data:
